<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmy — Srishti's Tactical Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { 50: '#FFF0F5', 100: '#FFE4EF', 200: '#FFB6D3', 300: '#FF87B2', 400: '#FF69B4', 500: '#FF1493', 600: '#DB0A7B' },
            blush: '#FFF5F7', cream: '#FFFAF5',
            lavender: { 50: '#F8F5FF', 100: '#EDE6FF', 200: '#DBC9FF', 300: '#C4A6FF' },
            rosegold: '#B76E79',
            timmy: { blue: '#4B9CD3', pink: '#FF87B2', hat: '#D14B7A', shirt: '#C54B7D' },
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Quicksand', 'sans-serif'] },
          boxShadow: { 'soft': '0 2px 20px rgba(255,105,180,0.12)', 'card': '0 4px 24px rgba(255,105,180,0.10)', 'glow': '0 0 30px rgba(75,156,211,0.25)' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Quicksand', sans-serif; }
    .polka-bg-subtle { background-image: radial-gradient(circle, rgba(75,156,211,0.18) 1px, transparent 1px); background-size: 28px 28px; }
    .fade-enter { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .msg { max-width: 78%; padding: 12px 16px; border-radius: 18px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; font-size: 14.5px; }
    .msg.u { align-self: flex-end; background: linear-gradient(135deg, #4B9CD3 0%, #3c86bb 100%); color: #fff; border-bottom-right-radius: 6px; }
    .msg.a { align-self: flex-start; background: #fff; color: #333; border: 1px solid #FFE4EF; border-bottom-left-radius: 6px; }
    html.dark .msg.a { background: #2a1824; color: #f5e6ee; border-color: #4a2c3c; }
    .msg.thinking { color: #999; font-style: italic; }
    .starter { background: #fff; border: 1px solid #FFE4EF; border-radius: 14px; padding: 12px 14px; font-size: 13.5px; color: #555; text-align: left; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .starter:hover { border-color: #4B9CD3; transform: translateY(-1px); }
    html.dark .starter { background: #2a1824; border-color: #4a2c3c; color: #f5e6ee; }
  </style>
  <link rel="stylesheet" href="theme.css">
  <script>
    (function() {
      try {
        var t = localStorage.getItem('srishti_theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    })();
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      const theme = isDark ? 'dark' : 'light';
      try { localStorage.setItem('srishti_theme', theme); } catch(e) {}
      if (typeof syncTheme === 'function') syncTheme(theme);
    }
  </script>
</head>
<body class="bg-cream min-h-screen">

  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md border-b border-rose-100 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-lavender-200 flex items-center justify-center text-white text-sm font-bold">S</span>
        <span class="font-display text-lg text-rose-600 hidden sm:block">Med School HQ</span>
      </a>
      <div class="flex items-center gap-1 sm:gap-2 flex-wrap justify-end">
        <a href="index.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Dashboard</a>
        <a href="schools.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Cosmo</a>
        <a href="unc.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Wanda</a>
        <a href="do-schools.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Mr. Crocker</a>
        <a href="timmy.html" class="px-3 py-1.5 rounded-full text-sm font-semibold bg-gradient-to-r from-timmy-pink to-timmy-blue text-white">Timmy</a>
        <button onclick="toggleTheme()" class="theme-toggle ml-1" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-10 px-4 sm:px-6 max-w-4xl mx-auto">

    <!-- Header -->
    <section class="text-center mb-8 fade-enter">
      <div class="inline-block mb-3 float-anim">
        <img src="assets/timmy.png" alt="Timmy" class="w-24 h-24 rounded-full object-cover object-top border-4 border-white shadow-glow mx-auto bg-white">
      </div>
      <h1 class="font-display text-4xl sm:text-5xl font-bold text-gray-800 mb-1">
        <span class="bg-gradient-to-r from-timmy-pink to-timmy-blue bg-clip-text text-transparent">Timmy</span>
      </h1>
      <p class="text-gray-500 text-sm">Ryan Gray's playbook. Srishti's real situation. Tactical answers only.</p>
    </section>

    <!-- Chat container -->
    <section class="bg-white rounded-3xl border border-rose-100 shadow-card overflow-hidden fade-enter polka-bg-subtle" style="animation-delay: 0.1s">
      <div id="chat-log" class="flex flex-col gap-3 p-6 overflow-y-auto" style="height: min(560px, calc(100vh - 340px)); min-height: 360px;"></div>

      <!-- Empty state with starters -->
      <div id="empty-state" class="px-6 pb-6 hidden">
        <p class="text-center text-gray-500 text-sm mb-4">Start with a question, or try one of these:</p>
        <div class="grid sm:grid-cols-2 gap-2" id="starters"></div>
      </div>

      <!-- Input -->
      <div class="border-t border-rose-100 p-3 bg-white flex gap-2">
        <textarea id="input" rows="1" placeholder="Ask about essays, schools, secondaries, LORs, interviews..." class="flex-1 resize-none border border-rose-100 rounded-xl px-3 py-2 text-sm outline-none focus:border-timmy-blue bg-white text-gray-700" style="max-height: 120px;"></textarea>
        <button id="send-btn" class="px-5 py-2 rounded-xl bg-gradient-to-r from-timmy-pink to-timmy-blue text-white font-semibold text-sm disabled:opacity-50">Send</button>
      </div>

      <div class="px-4 py-2 flex justify-between items-center bg-rose-50/40 border-t border-rose-100 text-xs text-gray-500">
        <span>Chat history is saved to your dashboard</span>
        <button id="clear-btn" class="text-rosegold hover:text-rose-500 font-semibold">Clear chat</button>
      </div>
    </section>

  </main>

  <script src="sync.js"></script>
  <script>
    const STORAGE_KEY = 'srishti_timmy_chat';
    const STARTERS = [
      "Critique my most recent PS draft — I'll paste it next",
      "Should Srishti apply to [school name]? Give me a verdict.",
      "Draft a 'why us' opener for MSU CHM using her Michigan roots",
      "How should she frame the PA letter vs a physician letter?",
      "What's the right story for a 'tell me about a failure' prompt?",
      "Retake CASPer or not? Walk me through the decision."
    ];

    const log = document.getElementById('chat-log');
    const empty = document.getElementById('empty-state');
    const starters = document.getElementById('starters');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');

    let history = [];
    try { history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch {}
    let sending = false;

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      if (typeof syncTimmyChat === 'function') syncTimmyChat(history);
    }

    function renderStarters() {
      starters.innerHTML = '';
      STARTERS.forEach(s => {
        const b = document.createElement('button');
        b.className = 'starter';
        b.textContent = s;
        b.onclick = () => { input.value = s; input.focus(); };
        starters.appendChild(b);
      });
    }

    function render() {
      log.innerHTML = '';
      if (history.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        for (const m of history) {
          const d = document.createElement('div');
          d.className = 'msg ' + (m.role === 'user' ? 'u' : 'a');
          d.textContent = m.content;
          log.appendChild(d);
        }
        log.scrollTop = log.scrollHeight;
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sending) return;
      sending = true;
      sendBtn.disabled = true;
      history.push({ role: 'user', content: text });
      saveHistory();
      input.value = '';
      render();
      const thinking = document.createElement('div');
      thinking.className = 'msg a thinking';
      thinking.textContent = 'Timmy is thinking…';
      log.appendChild(thinking);
      log.scrollTop = log.scrollHeight;
      try {
        const r = await fetch('/api/timmy-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history.map(m => ({ role: m.role, content: m.content })) })
        });
        const data = await r.json();
        thinking.remove();
        if (!r.ok) {
          const err = document.createElement('div');
          err.className = 'msg a';
          err.textContent = 'Error: ' + (data.error || r.status);
          log.appendChild(err);
        } else {
          history.push({ role: 'assistant', content: data.reply || '(no reply)' });
          saveHistory();
          render();
        }
      } catch (e) {
        thinking.remove();
        const err = document.createElement('div');
        err.className = 'msg a';
        err.textContent = 'Network error: ' + e.message;
        log.appendChild(err);
      } finally {
        sending = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    clearBtn.onclick = () => {
      if (!confirm('Clear this chat?')) return;
      history = [];
      saveHistory();
      render();
    };

    renderStarters();
    render();
    input.focus();
  </script>
</body>
</html>
