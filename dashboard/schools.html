<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo's Report — School List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { 50: '#FFF0F5', 100: '#FFE4EF', 200: '#FFB6D3', 300: '#FF87B2', 400: '#FF69B4', 500: '#FF1493', 600: '#DB0A7B' },
            blush: '#FFF5F7', cream: '#FFFAF5',
            lavender: { 50: '#F8F5FF', 100: '#EDE6FF', 200: '#DBC9FF', 300: '#C4A6FF' },
            rosegold: '#B76E79', mint: '#E8FFF5',
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Quicksand', 'sans-serif'] },
          boxShadow: { 'soft': '0 2px 20px rgba(255,105,180,0.12)', 'card': '0 4px 24px rgba(255,105,180,0.10)', 'glow': '0 0 30px rgba(255,20,147,0.15)' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Quicksand', sans-serif; }
    .polka-bg-subtle { background-image: radial-gradient(circle, rgba(255,182,211,0.3) 1px, transparent 1px); background-size: 32px 32px; }
    .fade-enter { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); }
    .tab-active { border-bottom: 2px solid #FF69B4; color: #FF69B4; }
  </style>
  <link rel="stylesheet" href="theme.css">
  <script>
    // Apply theme as early as possible to prevent flash
    (function() {
      try {
        var t = localStorage.getItem('srishti_theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    })();
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      const theme = isDark ? 'dark' : 'light';
      try { localStorage.setItem('srishti_theme', theme); } catch(e) {}
      if (typeof syncTheme === 'function') syncTheme(theme);
    }
  </script>
</head>
<body class="bg-cream min-h-screen">

  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md border-b border-rose-100 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-lavender-200 flex items-center justify-center text-white text-sm font-bold">S</span>
        <span class="font-display text-lg text-rose-600 hidden sm:block">Med School HQ</span>
      </a>
      <div class="flex items-center gap-1 sm:gap-2 flex-wrap justify-end">
        <a href="index.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Dashboard</a>
        <a href="schools.html" class="px-3 py-1.5 rounded-full text-sm font-semibold bg-rose-400 text-white">Cosmo</a>
        <a href="unc.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Wanda</a>
        <a href="do-schools.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Mr. Crocker</a>
        <a href="timmy.html" class="px-3 py-1.5 rounded-full text-sm font-semibold text-rose-500 hover:bg-rose-50 transition-colors">Timmy</a>
        <button onclick="toggleTheme()" class="theme-toggle ml-1" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-20 pb-16 px-4 sm:px-6 max-w-6xl mx-auto">

    <!-- Header -->
    <section class="text-center mb-8 fade-enter">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-rose-400 to-rose-500 flex items-center justify-center text-white text-xl">&#9733;</div>
        <h1 class="font-display text-3xl sm:text-4xl font-bold text-gray-800">Cosmo's Report</h1>
      </div>
      <p class="text-gray-500">21-school audit — who to reapply to, who to cut</p>
    </section>

    <!-- Search -->
    <div class="mb-6 max-w-md mx-auto">
      <input type="text" id="search" placeholder="Search schools..." class="w-full px-5 py-3 rounded-full border border-rose-200 bg-white focus:outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 text-sm transition-all">
    </div>

    <!-- Section Tabs -->
    <div class="flex justify-center gap-6 mb-8">
      <button onclick="showSection('reapply')" id="tab-reapply" class="pb-2 font-bold text-sm tab-active transition-colors">Reapply (12)</button>
      <button onclick="showSection('cut')" id="tab-cut" class="pb-2 font-bold text-sm text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors">Cut (9)</button>
    </div>

    <!-- REAPPLY Section -->
    <div id="section-reapply">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="reapply-grid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- CUT Section -->
    <div id="section-cut" class="hidden">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="cut-grid">
        <!-- Filled by JS -->
      </div>
    </div>

  </main>

  <!-- Detail Modal -->
  <div id="modal" class="fixed inset-0 z-[60] hidden">
    <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
    <div class="relative z-10 max-w-2xl mx-auto mt-20 mb-10 max-h-[80vh] overflow-y-auto bg-white rounded-3xl shadow-2xl border border-rose-100">
      <div id="modal-content" class="p-6 sm:p-8">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <script src="sync.js"></script>
  <script src="timmy-widget.js"></script>
  <script>
    const allSchools = [
      // REAPPLY
      { id: 'gw', name: 'George Washington SOM', loc: 'Washington, DC', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.88', mcat: '515', canadian: 'Canadians treated same as US citizens in the regular 4-year MD program. Not routed to separate international track.', mission: 'Global health, health policy, health equity. DC location offers policy exposure.', classSize: '~180', acceptRate: '~4%', whyCut: '', plan: 'Lead with cultural humility + health equity narrative. GW values global perspective — her Canadian-Indian-American identity is a strength. Mention her Med Anth training and how it prepares her for DC\'s diverse patient population.', outreach: 'Search for GW SOM student ambassadors on LinkedIn. Attend any virtual open houses. Look for South Asian student organizations.' },
      { id: 'wayne', name: 'Wayne State SOM', loc: 'Detroit, MI', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.78', mcat: '511', canadian: 'Dedicated Canadian applicant page on their website. 30-40% of class is non-resident. Requires financial support statement for 2 years.', mission: 'Urban underserved mission in Detroit. Strong primary care and community health.', classSize: '~290', acceptRate: '~6%', whyCut: '', plan: 'THIS IS HER MICHIGAN SCHOOL. Lead with Farmington Hills childhood, Dr. Godbole (childhood pediatrician), father\'s Detroit master\'s degree. She grew up in Oakland County — Wayne State will see her as a local. Play the Detroit connection hard.', outreach: 'Look for Oakland County / Farmington Hills alumni at Wayne State SOM. Connect with current students who have Michigan roots.' },
      { id: 'cmu', name: 'Central Michigan SOM', loc: 'Mt Pleasant, MI', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.80', mcat: '506', canadian: 'Explicitly accepts Canadian citizens, US citizens, and permanent residents of US or Canada.', mission: 'Rural/underserved Michigan focus. Primary care oriented.', classSize: '~104', acceptRate: '~4%', whyCut: '', plan: 'Michigan roots story again — Farmington Hills, Dr. Godbole, YMCA swimming. Her stats are well above median. This is a safety target. Feedback request already in progress — use whatever they say.', outreach: 'Follow up on the post-cycle feedback request. Ask what specifically they want to see improved.' },
      { id: 'jefferson', name: 'Sidney Kimmel (Jefferson)', loc: 'Philadelphia, PA', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.80', mcat: '513', canadian: 'Accepts international students including Canadians. Requires bachelor\'s from accredited US or Canadian institution. Same evaluation criteria.', mission: 'Clinical excellence, community service, diversity.', classSize: '~272', acceptRate: '~5%', whyCut: '', plan: 'Emphasize clinical growth — from 0 hours to 1,000+ at Medi-Weightloss. Her reapplicant narrative is strong here. Sidney Kimmel values community service, so lean into CPALS, STEM Sisters, and Play Atrium.', outreach: 'Look for Jefferson student ambassadors. Philadelphia has a large South Asian medical community.' },
      { id: 'tulane', name: 'Tulane SOM', loc: 'New Orleans, LA', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.70', mcat: '510', canadian: 'Citizenship-blind admissions. Identical process for domestic and international. Citizenship does not impact review.', mission: 'Community health, tropical medicine, global health, underserved populations. Strong social medicine orientation.', classSize: '~190', acceptRate: '~4%', whyCut: '', plan: 'OUTSTANDING mission fit. Lead with cultural humility, global health interest, underserved populations. Her Med Anth training aligns perfectly with Tulane\'s social medicine ethos. Stats well above — she\'s very competitive here.', outreach: 'Tulane has strong global health faculty. Search for social medicine programs and current students interested in cultural humility/health equity.' },
      { id: 'vcu', name: 'VCU SOM', loc: 'Richmond, VA', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.70', mcat: '512', canadian: 'Canadians explicitly listed alongside US citizens in eligibility requirements.', mission: 'Community health, health equity, underserved focus in Richmond.', classSize: '~216', acceptRate: '~5%', whyCut: '', plan: 'Geographic proximity — she\'s in Charlotte, Richmond is close. Health equity mission matches her cultural humility angle. Reference her MA work serving diverse patients at Medi-Weightloss.', outreach: 'VCU is relatively close. Consider attending in-person events if offered. Look for student organizations aligned with women\'s health or cultural diversity.' },
      { id: 'maryland', name: 'University of Maryland SOM', loc: 'Baltimore, MD', tier: 'reapply', sub: 'MD — Reapply', gpa: '3.84', mcat: '512', canadian: '"Citizens of Canada" explicitly listed as eligible alongside US citizens and permanent residents.', mission: 'Research-intensive with community health emphasis. Primary care and underserved focus.', classSize: '~160', acceptRate: '~4%', whyCut: '', plan: 'Research-heavy school — lean into her Marsico Lung Institute experience (340 hours). Combine with clinical growth narrative. Has a reapplicant question on secondary — address the gap honestly.', outreach: 'Look for research-focused faculty in areas aligned with her interests. Maryland has strong community health programs.' },
      { id: 'dartmouth', name: 'Dartmouth Geisel SOM', loc: 'Hanover, NH', tier: 'reapply', sub: 'MD — Promoted', gpa: '3.77', mcat: '516', canadian: 'Accepts Canadian and international students. Same financial aid package as US citizens. ~10 international students per year out of 96 total.', mission: 'Rural/underserved medicine, community health, health equity.', classSize: '96', acceptRate: '~4%', whyCut: '', plan: 'Small class means every applicant gets a close read. Her unique profile (Canadian-Indian-American, Med Anth, research + clinical) stands out. Play the rural health angle — connect her cultural humility framework to serving diverse rural communities. Reapplicant essay available.', outreach: 'Dartmouth is known for being reapplicant-friendly. Search for reapplicant success stories. Small class = tight community, so student ambassadors are approachable.' },
      { id: 'bu', name: 'Boston University SOM', loc: 'Boston, MA', tier: 'reapply', sub: 'MD — Promoted', gpa: '3.76', mcat: '517', canadian: 'Encourages international applicants with US/Canadian degrees. Notes Canadians don\'t need a visa to study in the US. Welcoming.', mission: 'Urban underserved and health equity mission.', classSize: '~175', acceptRate: '~4%', whyCut: '', plan: 'BU explicitly encourages Canadians — that\'s rare. Urban underserved mission matches her interests. Lead with the MA year as proof of commitment to underserved care. Has a reapplicant secondary question.', outreach: 'Look for BU SOM student ambassadors. Boston has a large South Asian medical community. Check for health equity student organizations.' },
      { id: 'emory', name: 'Emory SOM', loc: 'Atlanta, GA', tier: 'reapply', sub: 'MD — Promoted', gpa: '3.70', mcat: '514', canadian: 'Welcomes international applicants. Same admissions process as domestic. 10-15 international students accepted per year. No need-based aid for internationals.', mission: 'Research-intensive, global health, community health.', classSize: '~140', acceptRate: '~4%', whyCut: '', plan: 'Atlanta is close to Charlotte. Research-heavy — reference Marsico work. Global health mission aligns with her cultural humility angle. Stats well above median.', outreach: 'Emory has strong global health programs. Look for faculty in global health or maternal-infant health.' },
      { id: 'msu-chm', name: 'Michigan State CHM', loc: 'East Lansing, MI', tier: 'reapply', sub: 'MD — Promoted', gpa: '3.70', mcat: '507', canadian: 'Accepts Canadian citizens. Strong priority to Michigan residents. Very few international spots historically.', mission: 'Community-based medical education, underserved populations, primary care.', classSize: '~200', acceptRate: '~6%', whyCut: '', plan: 'Post-cycle feedback already received — USE IT. Michigan ties (Farmington Hills) help. Stats well above. Community-based model fits her primary care interest. She already knows what they want to see improved.', outreach: 'Reach back to whoever gave the post-cycle feedback. Michigan connection is the play here.' },
      { id: 'unc', name: 'UNC Chapel Hill SOM', loc: 'Chapel Hill, NC', tier: 'reapply', sub: 'MD — Reach', gpa: '3.82', mcat: '512', canadian: 'Accepts international applicants as out-of-state. No explicit barriers. BUT 83% of class is NC residents. OOS rate ~1-2%.', mission: 'Improve health of North Carolinians. Underserved populations, primary care, diversity.', classSize: '~190-229', acceptRate: '~3.7% overall, ~1-2% OOS', whyCut: '', plan: 'HER ALMA MATER. See Wanda\'s full report (unc.html) for the complete playbook. Key: leverage Marsico research, Med Anth minor → Social Medicine dept, Kenan Urban Primary Care Scholars (Charlotte-based). Outreach-heavy strategy required.', outreach: 'Dr. Schworer (PI), Dr. Rahangdale (admissions), South Asian student org, Friday virtual office hours at 11 AM. See Wanda\'s page for full list.' },
      // CUT
      { id: 'upenn', name: 'UPenn (Perelman) SOM', loc: 'Philadelphia, PA', tier: 'cut', sub: 'CUT', gpa: '3.97', mcat: '521', canadian: 'Accepts internationals. Must prove 4-year funding upfront.', mission: 'Research-intensive, innovation.', classSize: '~150', acceptRate: '~3%', whyCut: 'Stats below their median (3.97/521). Must prove full 4-year funding. Prestige reach with no traction last cycle.', plan: '', outreach: '' },
      { id: 'northwestern', name: 'Northwestern (Feinberg)', loc: 'Chicago, IL', tier: 'cut', sub: 'CUT', gpa: '3.93', mcat: '521', canadian: 'Accepts Canadians. Requires 3 years at accredited US/Canadian institution.', mission: 'Research, innovation.', classSize: '~170', acceptRate: '~3%', whyCut: 'Stats below median (3.93/521). Hyper-competitive for international reapplicant.', plan: '', outreach: '' },
      { id: 'brown', name: 'Brown (Warren Alpert)', loc: 'Providence, RI', tier: 'cut', sub: 'CUT', gpa: '3.83', mcat: '516', canadian: 'Accepts internationals. No need-based institutional funding.', mission: 'Scholarly concentration, liberal medical education.', classSize: '~144', acceptRate: '~3%', whyCut: 'Small class, no need-based aid for internationals, less mission alignment with primary care, no traction last cycle.', plan: '', outreach: '' },
      { id: 'stonybrook', name: 'Stony Brook SOM', loc: 'Stony Brook, NY', tier: 'cut', sub: 'CUT', gpa: '3.89', mcat: '514', canadian: 'Accepts Canadians. Must demonstrate ~$95K upfront for one year.', mission: 'SUNY school — strong NY preference.', classSize: '~128', acceptRate: '~4%', whyCut: 'SUNY = strong New York state preference. $95K upfront financial requirement. No financial aid for non-US citizens. No NY ties.', plan: '', outreach: '' },
      { id: 'suny', name: 'SUNY Upstate (Norton)', loc: 'Syracuse, NY', tier: 'cut', sub: 'CUT', gpa: '3.74', mcat: '512', canadian: 'Accepts Canadians. Priority given to US citizens "all else being equal."', mission: 'SUNY school — strong NY preference.', classSize: '~160', acceptRate: '~5%', whyCut: 'Another SUNY school with strong NY preference. Explicit US citizen priority. No NY ties.', plan: '', outreach: '' },
      { id: 'tufts', name: 'Tufts SOM', loc: 'Boston, MA', tier: 'cut', sub: 'CUT', gpa: '3.82', mcat: '514', canadian: '"Admits very few internationals" and only under "unique or compelling circumstances."', mission: 'Community health, global health.', classSize: '~200', acceptRate: '~4%', whyCut: 'Hostile language toward internationals — "very few" and "unique or compelling circumstances." Technically open but practically unwelcoming.', plan: '', outreach: '' },
      { id: 'uconn', name: 'UConn SOM', loc: 'Farmington, CT', tier: 'cut', sub: 'CUT', gpa: '3.76', mcat: '513', canadian: 'Accepts Canadians on a "limited basis."', mission: 'Primary care, community health. State school.', classSize: '~100', acceptRate: '~3%', whyCut: 'Public school with strong in-state preference. "Limited basis" for internationals. No CT ties.', plan: '', outreach: '' },
      { id: 'uic', name: 'UIC College of Medicine', loc: 'Chicago, IL', tier: 'cut', sub: 'CUT', gpa: '3.82', mcat: '511', canadian: 'Accepts Canadians with favorable treatment. But massive IL state preference.', mission: 'Urban underserved, diverse communities.', classSize: '~300', acceptRate: '~7%', whyCut: 'Overwhelming majority of seats go to Illinois residents. Canadian applicants face very long odds despite favorable processing.', plan: '', outreach: '' },
      { id: 'casewestern', name: 'Case Western SOM', loc: 'Cleveland, OH', tier: 'cut', sub: 'CUT', gpa: '3.90', mcat: '517', canadian: 'Accepts all international students. Equal evaluation. Must prove 1 year payment upfront.', mission: 'Research-heavy, Cleveland Clinic affiliation.', classSize: '~200', acceptRate: '~5%', whyCut: 'Must prove 1 year payment upfront. Stats right at median — not a standout. Less mission alignment with primary care/cultural humility focus.', plan: '', outreach: '' },
    ];

    // Load any user moves from localStorage
    const moved = JSON.parse(localStorage.getItem('srishti_school_moves') || '{}');
    allSchools.forEach(s => { if (moved[s.id]) s.tier = moved[s.id]; });

    function saveMove(id, newTier) {
      const school = allSchools.find(s => s.id === id);
      if (school) {
        school.tier = newTier;
        moved[id] = newTier;
        syncSchoolMoves(moved);
        renderAll();
      }
    }

    // Wanda queue helpers
    function getWandaQueue() {
      try { return JSON.parse(localStorage.getItem('srishti_wanda_queue') || '[]'); } catch(e) { return []; }
    }
    function isInWandaQueue(id) { return getWandaQueue().some(s => s.id === id); }
    function addToWandaQueue(id, name, loc, type) {
      const queue = getWandaQueue();
      if (queue.some(s => s.id === id)) return;
      queue.push({ id, name, loc, type, source: 'cosmo', addedAt: new Date().toISOString() });
      syncWandaQueue(queue);
      renderAll();
    }

    function renderCard(s) {
      const isReapply = s.tier === 'reapply';
      const borderClass = isReapply ? 'border-rose-100 hover:border-rose-300' : 'border-gray-200 hover:border-gray-300';
      const subColor = s.sub.includes('Reach') ? 'bg-yellow-50 text-yellow-600' : s.sub.includes('Promoted') ? 'bg-blue-50 text-blue-500' : isReapply ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-500';
      const queued = isInWandaQueue(s.id);

      return `
        <div class="school-card bg-white rounded-2xl p-5 border ${borderClass} shadow-soft hover:shadow-card cursor-pointer transition-all duration-300 hover:-translate-y-0.5 fade-enter" data-name="${s.name.toLowerCase()}" onclick="openModal('${s.id}')">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${subColor}">${s.sub}</span>
            ${!isReapply ? `<button onclick="event.stopPropagation(); saveMove('${s.id}','reapply')" class="text-xs text-rose-400 hover:text-rose-600 font-semibold transition-colors">Move to Reapply &uarr;</button>` : `<button onclick="event.stopPropagation(); saveMove('${s.id}','cut')" class="text-xs text-gray-400 hover:text-gray-600 font-semibold transition-colors">Move to Cut &darr;</button>`}
          </div>
          <h3 class="font-display text-lg font-bold text-gray-800 mb-1">${s.name}</h3>
          <p class="text-xs text-gray-400 mb-3">${s.loc}</p>
          <div class="flex gap-3 text-sm">
            <div><span class="text-gray-400">GPA</span> <span class="font-bold ${parseFloat(s.gpa) <= 3.88 ? 'text-green-500' : 'text-red-400'}">${s.gpa}</span></div>
            <div><span class="text-gray-400">MCAT</span> <span class="font-bold ${parseInt(s.mcat) <= 517 ? 'text-green-500' : 'text-red-400'}">${s.mcat}</span></div>
          </div>
          ${!isReapply && s.whyCut ? `<p class="text-xs text-gray-400 mt-3 line-clamp-2">${s.whyCut}</p>` : ''}
          ${isReapply ? `
            <button onclick="event.stopPropagation(); addToWandaQueue('${s.id}', '${s.name.replace(/'/g, "\\'")}', '${s.loc.replace(/'/g, "\\'")}', 'MD')" class="mt-3 w-full py-2 rounded-xl text-xs font-bold transition-all ${queued ? 'bg-lavender-100 text-lavender-300 cursor-default' : 'bg-gradient-to-r from-lavender-200 to-lavender-300 text-white hover:opacity-90 active:scale-[0.98]'}">
              ${queued ? '&#10003; Queued for Wanda' : '&#9829; Plan for Wanda'}
            </button>
          ` : ''}
        </div>
      `;
    }

    function renderAll() {
      const reapply = allSchools.filter(s => s.tier === 'reapply');
      const cut = allSchools.filter(s => s.tier === 'cut');
      document.getElementById('reapply-grid').innerHTML = reapply.map(renderCard).join('');
      document.getElementById('cut-grid').innerHTML = cut.map(renderCard).join('');
      document.getElementById('tab-reapply').textContent = `Reapply (${reapply.length})`;
      document.getElementById('tab-cut').textContent = `Cut (${cut.length})`;
    }

    function showSection(section) {
      document.getElementById('section-reapply').classList.toggle('hidden', section !== 'reapply');
      document.getElementById('section-cut').classList.toggle('hidden', section !== 'cut');
      document.getElementById('tab-reapply').classList.toggle('tab-active', section === 'reapply');
      document.getElementById('tab-cut').classList.toggle('tab-active', section === 'cut');
      if (section !== 'reapply') { document.getElementById('tab-reapply').classList.add('text-gray-400', 'border-transparent'); document.getElementById('tab-reapply').classList.remove('tab-active'); }
      if (section !== 'cut') { document.getElementById('tab-cut').classList.add('text-gray-400', 'border-transparent'); document.getElementById('tab-cut').classList.remove('tab-active'); }
    }

    function openModal(id) {
      const s = allSchools.find(x => x.id === id);
      if (!s) return;
      const notes = localStorage.getItem('srishti_notes_' + id) || '';
      const isReapply = s.tier === 'reapply';

      document.getElementById('modal-content').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="font-display text-2xl font-bold text-gray-800">${s.name}</h2>
            <p class="text-sm text-gray-400">${s.loc}</p>
          </div>
          <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-400 hover:bg-rose-100 transition-colors text-lg">&times;</button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
          <div class="bg-rose-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-400">Their GPA</div>
            <div class="font-bold text-lg text-gray-700">${s.gpa}</div>
          </div>
          <div class="bg-rose-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-400">Their MCAT</div>
            <div class="font-bold text-lg text-gray-700">${s.mcat}</div>
          </div>
          <div class="bg-green-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-400">Your GPA</div>
            <div class="font-bold text-lg text-green-500">3.88</div>
          </div>
          <div class="bg-green-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-400">Your MCAT</div>
            <div class="font-bold text-lg text-green-500">517</div>
          </div>
        </div>

        <div class="space-y-4 mb-6">
          <div>
            <div class="text-xs font-bold text-rose-400 uppercase tracking-wide mb-1">Class Size</div>
            <div class="text-sm text-gray-700">${s.classSize} &middot; Accept rate: ${s.acceptRate}</div>
          </div>
          <div>
            <div class="text-xs font-bold text-rose-400 uppercase tracking-wide mb-1">Canadian Policy</div>
            <div class="text-sm text-gray-700">${s.canadian}</div>
          </div>
          <div>
            <div class="text-xs font-bold text-rose-400 uppercase tracking-wide mb-1">Mission</div>
            <div class="text-sm text-gray-700">${s.mission}</div>
          </div>
          ${s.whyCut ? `<div><div class="text-xs font-bold text-red-400 uppercase tracking-wide mb-1">Why Cut</div><div class="text-sm text-gray-700">${s.whyCut}</div></div>` : ''}
        </div>

        <!-- Tabs -->
        <div class="border-t border-rose-50 pt-4">
          <div class="flex gap-4 mb-4">
            <button onclick="showModalTab('plan-${id}','notes-${id}', this)" class="pb-1 text-sm font-bold tab-active">Plan</button>
            <button onclick="showModalTab('notes-${id}','plan-${id}', this)" class="pb-1 text-sm font-bold text-gray-400 border-b-2 border-transparent">Notes</button>
          </div>

          <div id="plan-${id}">
            ${isReapply && s.plan ? `
              <div class="mb-4">
                <div class="text-xs font-bold text-rose-400 uppercase tracking-wide mb-2">Essay Strategy</div>
                <p class="text-sm text-gray-700 leading-relaxed">${s.plan}</p>
              </div>
              ${s.outreach ? `<div><div class="text-xs font-bold text-rose-400 uppercase tracking-wide mb-2">Outreach</div><p class="text-sm text-gray-700 leading-relaxed">${s.outreach}</p></div>` : ''}
            ` : `<p class="text-sm text-gray-400 italic">This school is currently in the Cut list. Move it to Reapply to see plan details.</p>`}
          </div>

          <div id="notes-${id}" class="hidden">
            <textarea id="notepad-${id}" placeholder="Write your thoughts about ${s.name}..." class="w-full h-40 p-4 rounded-xl border border-rose-100 text-sm focus:outline-none focus:border-rose-300 resize-none" oninput="syncNote('srishti_notes_${id}', this.value)">${notes}</textarea>
            <p class="text-xs text-gray-300 mt-1">Auto-saved to your browser</p>
          </div>
        </div>
      `;
      document.getElementById('modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function showModalTab(showId, hideId, btn) {
      document.getElementById(showId).classList.remove('hidden');
      document.getElementById(hideId).classList.add('hidden');
      btn.classList.add('tab-active');
      btn.previousElementSibling?.classList.remove('tab-active');
      btn.nextElementSibling?.classList.remove('tab-active');
      [...btn.parentElement.children].forEach(b => { if (b !== btn) { b.classList.remove('tab-active'); b.classList.add('text-gray-400', 'border-transparent'); } });
      btn.classList.remove('text-gray-400', 'border-transparent');
    }

    // Search
    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.school-card').forEach(card => {
        card.style.display = card.dataset.name.includes(q) ? '' : 'none';
      });
    });

    // ESC to close
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    renderAll();
  </script>
</body>
</html>
